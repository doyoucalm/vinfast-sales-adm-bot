# Copy ke evolution_nginx: /etc/nginx/conf.d/vinfast.conf
# Reload: docker exec evolution_nginx nginx -s reload

upstream vinfast_bot_upstream {
    server vinfast-bot:3001;
    keepalive 16;
}

server {
    listen 80;
    server_name vinfast.caricreatormu.my.id;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vinfast.caricreatormu.my.id;

    ssl_certificate     /etc/nginx/letsencrypt/live/vinfast.caricreatormu.my.id/fullchain.pem;
    ssl_certificate_key /etc/nginx/letsencrypt/live/vinfast.caricreatormu.my.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 25M;

    access_log /var/log/nginx/vinfast.access.log;
    error_log  /var/log/nginx/vinfast.error.log warn;

    location /health {
        proxy_pass http://vinfast_bot_upstream;
        access_log off;
    }

    location /media/ {
        proxy_pass http://vinfast_bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header Connection        "";
        proxy_read_timeout 30s;
        client_max_body_size 25M;
    }

    location / {
        proxy_pass http://vinfast_bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
